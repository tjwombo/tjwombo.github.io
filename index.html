<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <script src="https://rawgit.com/eligrey/FileSaver.js/master/src/FileSaver.js"></script>
  <style>
    .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
   }

    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <input type="file" id="data" name="data" onchange="previewFile()">
  <p class="content"></p>

  <pre id="output"></pre>

  <img id="tomat" src="./src/tomat.jpg" width="200" />

  <br>

  <img id="pug" src="./src/pug.gif" width="200" height="200" class="center" />

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md

    // Variables that use cookie values
    var pugScale=1;
    var pugMultiplier=.5;
    //var pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;

    async function previewFile() {
        const content = document.querySelector('.content');
        const [file] = document.querySelector('input[type=file]').files;
        const reader = new FileReader();

        reader.addEventListener("load", () => {
            // this will then display a text file
            content.innerText = reader.result;
            pugScale = parseInt(reader.result);
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;

            var blob = new Blob([pugScale], { type: "text/plain;charset=utf-8" });
            saveAs(blob, "dynamic.txt");
        }, false);

        if (file) {
            reader.readAsText(file);
        }
    }

    // Get the element of the pictures
    const tomat = document.getElementById("tomat")
    const pug = document.getElementById("pug")

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Test twitch chat command
      if (command === "yeeclaw") {
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "grow") {
        //pugScale = checkInt(pugScale);
        pugScale += pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale > 12) {
            pugScale = 12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        //cookiesWrite("scale", pugScale);

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "shrink") {
        //pugScale = checkInt(pugScale);
        pugScale -= pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale < -12) {
            pugScale = -12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        //cookiesWrite("scale", pugScale);

      // Change the pug multiplier *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "change") {
         //pugScale = checkInt(pugMultiplier);
         var newMult = parseFloat(message);
         newMult = Math.round(newMult * 10) / 10;
         console.log(newMult);
         if (newMult > 1) {
              newMult = 1;
         } else if (newMult < 0) {
              newMult = .1
         }
         pugMultiplier = newMult;
         //cookiesWrite("multiplier", pugMultiplier)

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            pugScale = 0;
            pugMultiplier = 1;
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
            //cookiesWrite("scale", pugScale)
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
