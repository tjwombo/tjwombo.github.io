<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
    .grow {
        transform: scaleY(1.5); scaleX(1.5);
    }
    
    .shrink {
        transform: scaleY(.5); scaleX(.5);
    }
  </style>
</head>
<body>
  <img id="tomat" src="./src/tomat.jpg" width="200" />
  <img id="pug" src="./src/pug.gif" width="200" />
  <script>
    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      if (command === "yeeclaw") {
        const tomat = document.getElementById("tomat")
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)
      } else if (command == "grow") {
        const pug = document.getElementById("pug")
        pug.classList.add("grow")
        setTimeout(() => {
            pug.classList.remove("grow")
        }, 1000)
      } else if (command == "shrink") {
        const pug = document.getElementById("pug")
        pug.classList.add("shrink")
        setTimeout(() => {
            pug.classList.remove("shrink")
        }, 1000)
      }
    }
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
