<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
   }

    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <img id="tomat" src="./src/tomat.jpg" width="200" />

  <br>

  <img id="pug" src="./src/pug.gif" width="200" height="200" class="center" />

  <script>

    // Sets a cookie on the page so you can read/write a persistent value
    async function cookies(names, values) {
        try {
            await cookieStore.set(names, values);
        } catch (e) {
            console.error(`Failed to set cookie: ${e}`);
        }

        await cookieStore.set({
            name: names,
            value: values,
            expires: null,  // session cookie

            // By default, domain is set to null which means the scope is locked at the current domain.
            domain: null,
            path: '/'
        });
    }

    var pugScale=1;
    var pugMultiplier=.5;
    //var pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;

    async function readCookie() {
        try {
            const cookie = await cookieStore.get("scale");
            if (cookie) {
                console.log(`Found ${cookie.name} cookie: ${cookie.value}`);

                if (cookie.name = "scale") {
                    console.log(cookie.value);
                    pugScale = cookie.value;
                }

            } else {
                console.log('Cookie not found');
            }
        } catch (e) {
            console.error(`Cookie store error: ${e}`);
        }
    }

    readCookie();

    var text="";
    var text2="";


    document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;

    const tomat = document.getElementById("tomat")
    const pug = document.getElementById("pug")

    
    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      if (command === "yeeclaw") {
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)

      } else if (command == "grow") {
        pugScale += pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale > 12) {
            pugScale = 12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        cookiesWrite("scale", pugScale);

      } else if (command == "shrink") {
        pugScale -= pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale < -12) {
            pugScale = -12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        cookiesWrite("scale", pugScale);

      } else if (flags.broadcaster && command == "reset") {
            pugScale = 0;
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
            cookiesWrite("scale", pugScale);
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
