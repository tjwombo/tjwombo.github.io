<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <h1>/orgs/{org}/actions/secrets</h1>
  <img id="ferris" src="./src/tomat.jpg" width="200" />
  <script>
    //ComfyJS.onCommand = (user, command, message, flags, extra) => {
    //  if (command === "yeeclaw") {
    //    const ferris = document.getElementById("ferris")
    //    ferris.classList.add("rotate")
    //    setTimeout(() => {
    //      ferris.classList.remove("rotate")
    //    }, 1000)
    //  }
    //}
    //ComfyJS.Init("maxcellw");
    onst tmi = require('tmi.js');

    // Define configuration options
    const opts = {
        identity: {
            username: process.env.BOT_USERNAME,
            password: process.env.OAUTH_TOKEN
        },
        channels: [
            process.env.CHANNEL_NAME
        ]
    };

    // Create a client with our options
    const client = new tmi.client(opts);

    // Register our event handlers (defined below)
    client.on('message', onMessageHandler);
    client.on('connected', onConnectedHandler);

    // Connect to Twitch:
    client.connect();

    // Called every time a message comes in
    function onMessageHandler (target, context, msg, self) {
        if (self) { return; } // Ignore messages from the bot

        // Remove whitespace from chat message
        const commandName = msg.trim();


        // If the command is known, let's execute it
        if (commandName === '!d20') {
            const num = rollDice(commandName);
            client.say(target, `You rolled a ${num}.`);
            console.log(`* Executed ${commandName} command`);
        } else {
            console.log(`* Unknown command ${commandName}`);
        }
  
    }

    // Function called when the "dice" command is issued
    function rollDice () {
    const sides = 20;
    return Math.floor(Math.random() * sides) + 1;
    }

    // Called every time the bot connects to Twitch chat
    function onConnectedHandler (addr, port) {
        console.log(`* Connected to ${addr}:${port}`);
    }

  </script>
</body>
</html>
