<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <input type="file" name = "inputfile"
           id="inputfile">
   <br>

   <pre id="output"></pre>

  <img id="tomat" src="./src/tomat.jpg" width="200" />
  <img id="pug" src="./src/pug.gif" width="200" />
  <object data="./src/pugValues.txt" name="pugValues"></object>
  <script>
    var text="";
    var text2="";
    var pugScale=1;
    var pubMultiplier=.5;

    //document.getElementById("pugValues") = function(){
    //    var file = this.files[0];
    //    var reader = new FileReader();
    //    reader.onload = function(progressEvent){
    //        text2=(this.result).split("\n");
    //    };
    //    reader.readAsText(file);
    //};

    var test = document.getElementById("pugValues");
    console.log(test);

    document.getElementsByName('pugValues').onload = function(){

        var file = this.files[0];

        var reader = new FileReader();
        reader.onload = function(progressEvent){
            text2=(this.result).split("\n");
        };
        reader.readAsText(file);

        var pugScale = parseInt(text2[0]);
        var pugMultiplier = parseInt(text2[1]);
        console.log(pugScale);
        console.log(pugMultiplier);
}   ;

    document.getElementById('inputfile').onchange = function(){

        var file = this.files[0];

        var reader = new FileReader();
        reader.onload = function(progressEvent){
            text=(this.result).split("\n");
        };
        reader.readAsText(file);
}   ;

    const tomat = document.getElementById("tomat")
    const pug = document.getElementById("pug")
    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      if (command === "yeeclaw") {
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)
      } else if (command == "grow") {
        pugScale += .5;
        if (pugScale > 12) {
            pugScale = 12;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        //console.log(text[0]);
        //console.log(text[1]);
      } else if (command == "shrink") {
        pugScale -= .5;
        if (pugScale < -12) {
            pugScale = -12;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
