<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
   }

    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <input type="file" id="data" name="data">

  <pre id="output"></pre>

  <img id="tomat" src="./src/tomat.jpg" width="200" />

  <br>

  <img id="pug" src="./src/pug.gif" width="200" height="200" class="center" />

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md


    // Sets a cookie on the page so you can read/write a persistent value, this one writes to it
    async function cookiesWrite(names, values) {
        try {
            document.cookie = names + "=" + values;
            console.log(document.cookie);
        } catch (e) {
            console.error(`Failed to set cookie: ${e}`);
        }
    }

    // Makes sure that the cookies that are read are still ints
    function checkInt(number) {
        if (isNaN(number)) {
            return 1;
        }
        return number;
    }

    // Variables that use cookie values
    var pugScale=1;
    var pugMultiplier=.5;
    var test;
    //var pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;

    // Read cookies and update the variables
    async function cookiesRead() {
        try {

            var cookieList = document.cookie;
            var splitCookieList = cookieList.split("; ");
            for(int i = 0; i < splitCookieList.length; i++) {
                console.log(splitCookieList[i]);
            }
            
            var cookie;
            var cookie2;

            if (cookie) {
                    pugScale = cookie.value;
            }
            if (cookie2) {
                pugMultiplier = cookie2.value;
            }
            pugScale = checkInt(pugScale);
            pugMultiplier = checkInt(pugMultiplier);
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        } catch (e) {
            console.error(`Cookie store error: ${e}`);
        }
    }

    cookiesRead();

    async function readValues(file) {
        const reader = new FileReader()
        reader.onload = event => console.log(event.target.result) // desired file content
        reader.onerror = error => reject(error)
        reader.readAsText(file) // you could also read images and other binaries

        //text = await file.text();
        document.getElementById('output').textContent = text;
        pugScale = parseInt(text);
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        console.log(pugScale);
        console.log(text);
        //document.write(text);
        console.log(test);
    }

    // Get the element of the pictures
    const tomat = document.getElementById("tomat")
    const pug = document.getElementById("pug")

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Test twitch chat command
      if (command === "yeeclaw") {
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "grow") {
        pugScale = checkInt(pugScale);
        pugScale += pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale > 12) {
            pugScale = 12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        cookiesWrite("scale", pugScale);

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "shrink") {
        pugScale = checkInt(pugScale);
        pugScale -= pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale < -12) {
            pugScale = -12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        cookiesWrite("scale", pugScale);

      // Change the pug multiplier *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "change") {
         pugScale = checkInt(pugMultiplier);
         var newMult = parseFloat(message);
         newMult = Math.round(newMult * 10) / 10;
         console.log(newMult);
         if (newMult > 1) {
              newMult = 1;
         } else if (newMult < 0) {
              newMult = .1
         }
         pugMultiplier = newMult;
         cookiesWrite("multiplier", pugMultiplier)

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            pugScale = 0;
            pugMultiplier = 1;
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
            cookiesWrite("scale", pugScale);
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
