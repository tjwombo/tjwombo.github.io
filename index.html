<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
   }

    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <img id="pug" src="./src/pug.gif" width="200" height="200" class="center" />

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md

    // Get the element of the pug
    const pug = document.getElementById("pug");

    // Variables that use cookie values
    var pugScale=1;
    var pugMultiplier=.5;
    //var pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;

    // Check to see if we have cookies and write them if they dont exist
    scaleExists = false;
    if (document.cookie != null) {
        allCookies = document.cookie.split('; ');
   
        for(i = 0; i < allCookies.length; i++) {
   
            if (allCookies[i].includes("scale")) {
                scaleExists = true;
                break;
            }
        }
    }

    // Create the cookie if it doesn't exist
    if (!scaleExists) {
        document.cookie = "scale=0; expires=Thu, 01 Jan 2080 00:00:00 UTC";
    }

    // Read the cookie and put the value into the variables
    for (i = 0; i < document.cookie.split('; ').length; i++) {

        if (document.cookie.split('; ')[i].includes("scale")) {
            pugScale = parseFloat(document.cookie.split('; ')[i].substring(document.cookie.split('; ')[i].indexOf("=")+1));
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        }
    }

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      if (command == "grow") {
        pugScale += pugMultiplier;
        if (pugScale > 12) {
            pugScale = 12;
        }

        // Truncate trailing numbers
        pugScale = Math.trunc(pugScale*10)/10;

        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        
        // Write the value to the cookie
        document.cookie = "scale=" + pugScale + "; expires=Thu, 01 Jan 2080 00:00:00 UTC";

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "shrink") {
        //pugScale = checkInt(pugScale);
        pugScale -= pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale < -12) {
            pugScale = -12;
            //pugPercentage = 240;
        }

        // Truncate trailing numbers
        pugScale = Math.trunc(pugScale*10)/10;

        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
        
        // Write the value to the cookie
        document.cookie = "scale=" + pugScale + "; expires=Thu, 01 Jan 2080 00:00:00 UTC";

      // Change the pug multiplier *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "change") {
         //pugScale = checkInt(pugMultiplier);
         var newMult = parseFloat(message);
         newMult = Math.round(newMult * 10) / 10;
         console.log(newMult);
         if (newMult > 1) {
              newMult = 1;
         } else if (newMult < 0) {
              newMult = .1
         }
         pugMultiplier = newMult;
         
         // Write the value to the cookie
        document.cookie = "scale=" + pugScale + "; expires=Thu, 01 Jan 2080 00:00:00 UTC";

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            pugScale = 0;
            pugMultiplier = 1;
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
            
            // Write the value to the cookie
            document.cookie = "scale=" + pugScale + "; expires=Thu, 01 Jan 2080 00:00:00 UTC";
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
