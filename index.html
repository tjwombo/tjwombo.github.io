<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
   }

    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }
  </style>
</head>
<body>
  <script src="src/pugValues.txt"></script>

  <br>

  <img id="tomat" src="./src/tomat.jpg" width="200" />

  <br>

  <img id="pug" src="./src/pug.gif" width="200" height="200" class="center" />

  <script src="http://cdn.jsdeliver.net/gh/tjwombo/tjwombo.github.io/src/test.js"></script>

  <script>

    var text="";
    var text2="";

    var pugScale = parseFloat(testpugScale.split(" ")[0])
    var pugMultiplier = parseFloat(testpugScale.split(" ")[1])
    //var pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;

    var testpugScale = "";
    async function filestuff() {
        const url1 = 'https://raw.githubusercontent.com/tjwombo/tjwombo.github.io/main/src/testPugValues.txt'
        const response = await fetch(url1);
        testpugScale = await response.text();
        pugScale = parseFloat(testpugScale.split(" ")[0])
        pugMultiplier = parseFloat(testpugScale.split(" ")[1])
    }
    filestuff();

    document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;

    const tomat = document.getElementById("tomat")
    const pug = document.getElementById("pug")

    
    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      if (command === "yeeclaw") {
        tomat.classList.add("rotate")
        setTimeout(() => {
          tomat.classList.remove("rotate")
        }, 1000)

      } else if (command == "grow") {
        pugScale += pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale > 12) {
            pugScale = 12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;

      } else if (command == "shrink") {
        pugScale -= pugMultiplier;
        //pugPercentage = (Math.abs(pugMultiplier-1) / .5) * -10;
        if (pugScale < -12) {
            pugScale = -12;
            //pugPercentage = 240;
        }
        document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;

      } else if (flags.broadcaster && command == "reset") {
            pugScale = 0;
            document.querySelector("#pug").style.transform = `scale(${pugScale}, ${pugScale})`;
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
