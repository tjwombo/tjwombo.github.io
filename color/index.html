<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .color-box {
        width: 1980px;
        height: 1080px;
        display: inline-block;
        background-color: #ccc;
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        opacity: "0.5";
    }
    .rotate {
    animation: rotation 1s 1 linear;
  }
  @keyframes rotation {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(359deg);
    }
  }

  </style>
</head>
<body>
  <input type="file" id="data" name="data" onchange="previewFile()">
  <p class="content"></p>

  <pre id="output"></pre>

  <div class="color-box" id="box" style="background-color: #FF850A;"></div>
    <!-- Replace "#FF850A" to change the color -->

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md

    var colorValue;

    async function previewFile() {
        const content = document.querySelector('.content');
        const [file] = document.querySelector('input[type=file]').files;
        const reader = new FileReader();

        reader.addEventListener("load", () => {
            colorValue = parseInt(reader.result);
            document.querySelector("#box").style = `background-color: ${colorValue}`;

            // WRITE TO FILE
            //document.getElementById("data").value = pugScale;
        }, false);

        if (file) {
            reader.readAsText(file);
        }
    }

    // Get the element of the pictures
    const colorBox = document.getElementById("box");

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Test twitch chat command
      if (command === "yeeclaw") {
        colorBox.classList.add("rotate")
        setTimeout(() => {
          colorBox.classList.remove("rotate")
        }, 1000)

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "red") {
        //PROBABLY SOME LIMITER

        colorValue = "#" + (parseInt(colorValue.substring(1), 16)+3276800);
        colorValue = "#" + (parseInt(colorValue.substring(1), 16)-50);

        document.querySelector("#box").style = `background-color: ${colorValue}`;
        document.getElementById("box").style.opacity = "0.5";

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "blue") {
        //PROBABLY SOME LIMITER

        colorValue = "#" + (parseInt(colorValue.substring(1), 16)+50);
        colorValue = "#" + (parseInt(colorValue.substring(1), 16)-3276800);

        document.querySelector("#box").style = `background-color: ${colorValue}`;
        document.getElementById("box").style.opacity = "0.5";

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            colorValue = "#FF850A";
            document.querySelector("#box").style = `background-color: #FF850A`;
            document.getElementById("box").style.opacity = "0.5";
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
