<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <script src="https://rawgit.com/eligrey/FileSaver.js/master/src/FileSaver.js"></script>
  <style>
  
    .color-box {
        width: 500px;
        height: 500px;
        display: inline-block;
        background-color: #ccc;
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        opacity: 0.0;
    }
    .red {
        background-color: red;
    }

    .blue {
        background-color: blue;
    }
  </style>
</head>
<body>
  <input type="file" id="data" name="data" onchange="previewFile()">

  <input type="file" id="colors" name="colors" onchange="previewFile2()">

  <img id="box" class="color-box red" id="box" />
    <!-- Replace "#FF850A" to change the color -->

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md

    // Variables that we are adjusting
    var opacity = 1;

    // Get the element of the pictures
    const colorBox = document.getElementById("box");

    // Check to see if we have cookies and write them if they dont exist
    opacityExists = false;
    colorExists = false;
    if (document.cookie != null) {
        allCookies = document.cookie.split('; ');
   
        for(i = 0; i < allCookies.length; i++) {
            if (allCookies[i].name = "opacity") {
                opacityExists = true;
                continue;
            } else if (allCookies[i].name = "color") {
                colorExists = true;
                continue;
            } else {
                if (opacityExists & colorExists) {
                    break;
                }
            }
        }
    }
   
    if (!opacityExists) {
        if (document.cookie != null) {
            document.cookie = document.cookie+"; opacity=0; expires="+time() + (10 * 365 * 24 * 60 * 60);
        } else {
            document.cookie = "opacity=0; expires="+time() + (10 * 365 * 24 * 60 * 60);
        }
    }
    if (!colorExists) {
        if (document.cookie != null) {
            document.cookie = document.cookie+"color=red; expires="+time() + (10 * 365 * 24 * 60 * 60);
        } else {
            document.cookie = "opacity=0; expires="+time() + (10 * 365 * 24 * 60 * 60);
        }
    }

    async function previewFile() {
        const content = document.querySelector('.content');
        const [file] = document.querySelector('input[type=file]').files;
        const reader = new FileReader();

        reader.addEventListener("load", () => {
            // Set the opacity to the opacity
            opacity = parseFloat(reader.result);
            document.querySelector("#box").style.opacity = opacity;

            // Write the opacity to the cookie
            for(i = 0; i < document.cookie.split('; ').length; i++) {
                console.log(document.cookie);
                console.log(document.cookie.split('; ')[i].includes("opacity"))
                if (document.cookie.split('; ')[i].includes("opacity")) {
                    console.log(document.cookie.split('; ')[i]);
                    console.log("opacity="+opacity);
                    document.cookie.replace(document.cookie.split('; ')[i], "opacity="+opacity);
                    document.cookie.split('; ')[i] = "opacity="+opacity;
                    console.log(opacity);
                    console.log(document.cookie);
                }
            }
            
        }, false);

        if (file) {
            reader.readAsText(file);
        }
    }

    async function previewFile2() {
        const content = document.querySelector('.content');
        const [file] = document.querySelector('input[name=colors]').files;
        const reader = new FileReader();

        reader.addEventListener("load", () => {
            color = "";

            // Set the color to the color
            if (reader.result == "red") {
                color = "red";
                colorBox.classList.add("red");
            } else if (reader.result == "blue") {
                color = "blue";
                colorBox.classList.add("blue");
            }

            // Write the value to the cookie
            for(i = 0; i < document.cookie.split('; ').length; i++) {
                if (document.cookie.split('; ')[i].name == "color") {
                    document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+color;
                }
            }
        }, false);

        if (file) {
            reader.readAsText(file);
        }
    }

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      if (command == "red") {
        //PROBABLY SOME LIMITER
        color = "";

        if (colorBox.classList.contains("red")) {
            color = "red";
            opacity = parseFloat(opacity) + 0.1;
            document.getElementById("box").style.opacity = opacity;
        } else if (document.getElementById("box").style.opacity == 0) {
            color = "red";
            colorBox.classList.remove("blue");
            colorBox.classList.add("red")
            opacity = parseFloat(opacity) + 0.1;
            document.getElementById("box").style.opacity = opacity;
        } else {
            color = "blue";
            opacity = parseFloat(opacity) - 0.1;
            document.getElementById("box").style.opacity = opacity;
        }

        for(i = 0; i < document.cookie.split('; ').length; i++) {
            if (document.cookie.split('; ')[i].name = "opacity") {
                document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+opacity;
            } else if (document.cookie.split('; ')[i].name = "color") {
                document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+color;
            }
        }

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "blue") {
        //PROBABLY SOME LIMITER
        color = "";

        if (colorBox.classList.contains("blue")) {
            color = "blue";
            opacity = parseFloat(opacity) + 0.1;
            document.getElementById("box").style.opacity = opacity;
        } else if (document.getElementById("box").style.opacity == 0) {
            color = "blue";
            colorBox.classList.remove("red");
            colorBox.classList.add("blue");
            opacity = parseFloat(opacity) + 0.1;
            document.getElementById("box").style.opacity = opacity;
        } else {
            color = "red";
            opacity = parseFloat(opacity) - 0.1;
            document.getElementById("box").style.opacity = opacity;
        }

        for(i = 0; i < document.cookie.split('; ').length; i++) {
            if (document.cookie.split('; ')[i].name = "opacity") {
                document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+opacity;
            } else if (document.cookie.split('; ')[i].name = "color") {
                document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+color;
            }
        }

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            colorBox.classList.remove("red")
            colorBox.classList.remove("blue")
            opacity = 0.0;
            document.getElementById("box").style.opacity = opacity;

            for(i = 0; i < document.cookie.split('; ').length; i++) {
                if (document.cookie.split('; ')[i].name = "opacity") {
                    document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+opacity;
                } else if (document.cookie.split('; ')[i].name = "color") {
                    document.cookie.split('; ')[i] = document.cookie.split('; ')[i]+"="+color;
                }
            }
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
