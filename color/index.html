<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If you're not OBS, Go Away</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    .color-box {
        width: 1980px;
        height: 1080px;
        display: inline-block;
        background-color: #ccc;
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        opacity: 0.5;
    }
    .red {
        background-color: red;
    }

    .blue {
        background-color: blue;
    }
  </style>
</head>
<body>
  <input type="file" id="data" name="data" onchange="previewFile()">
  <p class="content"></p>

  <pre id="output"></pre>

  <div class="color-box red" id="box"></div>
    <!-- Replace "#FF850A" to change the color -->

  <script>
    //LINK TO TWITCH JS STUFF
    //https://github.com/instafluff/ComfyJS/blob/master/README.md

    var opacity = 0;

    async function previewFile() {
        const content = document.querySelector('.content');
        const [file] = document.querySelector('input[type=file]').files;
        const reader = new FileReader();

        reader.addEventListener("load", () => {
            opacity = parseInt(reader.result);
            document.querySelector("#box").style.opacity = "0.5";

            // WRITE TO FILE
            //document.getElementById("data").value = pugScale;
        }, false);

        if (file) {
            reader.readAsText(file);
        }
    }

    // Get the element of the pictures
    const colorBox = document.getElementById("box");

    // Twitch chat commands
    ComfyJS.onCommand = (user, command, message, flags, extra) => {

      // Grow the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      if (command == "red") {
        //PROBABLY SOME LIMITER

        if (document.getElementById("box").style.color == "red") {
            opacity += 0.1;
            document.getElementById("box").style.opacity += 0.1;
        } else if (document.getElementById("box").style.opacity == 0) {
            colorBox.classList.remove("blue");
            colorBox.classList.add("red")
            opacity += 0.1;
            document.getElementById("box").style.opacity += 0.1;
        } else {
            opacity -= 0.1;
            document.getElementById("box").style.opacity -= 0.1;
        }

      // Shrink the pug *EVENTUALLY MOVE TO CHANNEL POINTS*
      } else if (command == "blue") {
        //PROBABLY SOME LIMITER

        if (document.getElementById("box").style.color == "blue") {
            opacity++;
            document.getElementById("box").style.opacity += 0.1;
        } else if (document.getElementById("box").style.opacity == 0) {
            colorBox.classList.remove("red");
            colorBox.classList.add("blue");
            opacity += 0.1;
            document.getElementById("box").style.opacity += 0.1;
        } else {
            opacity -= 0.1;
            document.getElementById("box").style.opacity -= 0.1;
        }

      // Reset the pug (more of a in case of fire command, only I can use it)
      } else if (flags.broadcaster && command == "reset") {
            colorBox.classList.remove("red")
            colorBox.classList.remove("blue")
            document.getElementById("box").style.opacity = "0.0";
      }
    }
    //ComfyJS.Init( process.env.TWITCHUSER, process.env.OAUTH );
    ComfyJS.Init("tjwombo");

  </script>
</body>
</html>
